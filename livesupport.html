<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wstorepk Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .header-bg { background-color: #2c1a1a; }
        #chat-msgs { height: 72vh; overflow-y: auto; display: flex; flex-direction: column; padding: 15px; background: #f9f9f9; }
        /* Style for HTML messages */
        .msg-bot { background: #ffffff; border: 1px solid #eee; padding: 10px 14px; border-radius: 18px 18px 18px 0; margin: 5px 0; align-self: flex-start; max-width: 85%; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .msg-user { background: #e2e8f0; color: #000; padding: 10px 14px; border-radius: 18px 18px 0 18px; margin: 5px 0; align-self: flex-end; max-width: 80%; font-size: 14px; }
        .system-msg { align-self: center; background: #eee; color: #666; font-size: 11px; padding: 4px 12px; border-radius: 20px; margin: 10px 0; font-weight: bold; text-transform: uppercase; }
        .opt-btn { border: 1px solid #2c1a1a; padding: 7px 18px; border-radius: 25px; background: white; margin: 4px; font-size: 13px; color: #2c1a1a; font-weight: 500; transition: 0.3s; }
        .opt-btn:hover { background: #2c1a1a; color: white; }
        /* Style links in HTML replies */
        .msg-bot a { color: #007bff; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-200">
    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <div class="max-w-md mx-auto bg-white h-screen shadow-2xl flex flex-col relative">
        <!-- Header: Starts with Najeeb Bot by Default -->
        <div class="header-bg p-4 flex items-center text-white min-h-[75px] shadow-md z-10">
            <div id="agent-header" class="flex items-center w-full">
                <!-- Default Bot Image -->
                <img id="agent-dp" src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" class="w-12 h-12 rounded-full mr-3 border-2 border-white object-cover bg-white p-1">
                <div class="flex-grow">
                    <h3 id="agent-name" class="font-bold text-base leading-tight">Najeeb Bot</h3>
                    <p id="agent-status-text" class="text-[11px] text-gray-300 flex items-center">
                         Automated Assistant
                    </p>
                </div>
            </div>
        </div>

        <!-- Name Input Screen -->
        <div id="reg-screen" class="flex-grow flex flex-col justify-center px-8 text-center bg-white">
            <h2 class="text-xl font-extrabold text-gray-800 mb-6">Wstorepk Live Support</h2>
            <input type="text" id="u-name" class="w-full border-2 border-gray-100 p-3 rounded-xl mb-4 outline-none focus:border-[#2c1a1a]" placeholder="Enter Your Name">
            <button onclick="startChat()" class="header-bg text-white w-full py-3 rounded-xl font-bold">Start Chat</button>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="flex-grow flex flex-col hidden overflow-hidden">
            <div id="chat-msgs"></div>
            <div id="options-box" class="p-3 flex flex-wrap justify-center bg-white border-t border-gray-100"></div>
            <div id="input-box" class="p-4 border-t border-gray-100 flex items-center bg-white hidden">
                <input type="text" id="msg-input" class="flex-grow outline-none text-sm bg-gray-50 p-3 rounded-l-xl" placeholder="Type your message...">
                <button onclick="sendMsg()" class="header-bg text-white px-5 py-3 rounded-r-xl font-bold">Send</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAZzGQkZGdpOjhMO3kTUgaAbwh-Fd7B1vQ",
            authDomain: "gen-lang-client-0714644264.firebaseapp.com",
            databaseURL: "https://gen-lang-client-0714644264-default-rtdb.firebaseio.com",
            projectId: "gen-lang-client-0714644264",
            storageBucket: "gen-lang-client-0714644264.firebasestorage.app",
            messagingSenderId: "69637950744",
            appId: "1:69637950744:web:7625bda135597bb3ada26d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let sid = "", userName = "", hasAgentJoined = false;

        function startChat() {
            userName = document.getElementById('u-name').value.trim();
            if(!userName) return alert("Please enter name");
            sid = "chat_" + Date.now();
            document.getElementById('reg-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            
            db.ref('sessions/'+sid).set({ userName, status: 'active' });
            botReply("Welcome to Welcome to Wstorepk ! Please select your preferred language to continue.");
            showOpts(['English', 'اردو', 'Roman Urdu'], 'lang');

            // Agent Check
            db.ref('sessions/'+sid).on('value', snap => {
                const data = snap.val();
                if(data && data.agent) {
                    document.getElementById('agent-name').innerText = data.agent.name;
                    document.getElementById('agent-dp').src = data.agent.dp;
                    document.getElementById('agent-status-text').innerHTML = '<span class="w-2 h-2 bg-green-400 rounded-full mr-1 animate-pulse"></span> Active Now';
                    document.getElementById('input-box').classList.remove('hidden');
                    if(!hasAgentJoined) {
                        systemMsg(`${data.agent.name} joined the conversation`);
                        document.getElementById('msg-sound').play();
                        hasAgentJoined = true;
                    }
                }
                if(data && data.status === 'closed') { alert("Conversation Ended"); location.reload(); }
            });

            // Listen for Messages (HTML SUPPORTED)
            db.ref('messages/'+sid).on('child_added', snap => {
                const m = snap.val();
                if(m.sender !== userName) {
                    botReply(m.text); // renders HTML
                    document.getElementById('msg-sound').play();
                }
            });
        }

        function botReply(t) {
            const box = document.getElementById('chat-msgs');
            // Use innerHTML to support HTML replies from Admin
            box.innerHTML += `<div class="msg-bot">${t}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function systemMsg(t) {
            const box = document.getElementById('chat-msgs');
            box.innerHTML += `<div class="system-msg">${t}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function showOpts(opts, type) {
            const box = document.getElementById('options-box');
            box.innerHTML = "";
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = "opt-btn";
                btn.innerText = o;
                btn.onclick = () => {
                    document.getElementById('chat-msgs').innerHTML += `<div class="msg-user">${o}</div>`;
                    box.innerHTML = "";
                    db.ref('sessions/'+sid+'/path').push(o);
                    if(type === 'lang') {
                        botReply("Please select your issue:");
                        showOpts(['Account Issue', 'Order Issue', 'Order Pending', 'Other'], 'issue');
                    } else {
                        botReply("Please hold on we are connecting you to a specialist.");
                    }
                };
                box.appendChild(btn);
            });
        }

        function sendMsg() {
            const t = document.getElementById('msg-input').value.trim();
            if(!t) return;
            db.ref('messages/'+sid).push({ sender: userName, text: t });
            document.getElementById('chat-msgs').innerHTML += `<div class="msg-user">${t}</div>`;
            document.getElementById('msg-input').value = "";
            document.getElementById('chat-msgs').scrollTop = document.getElementById('chat-msgs').scrollHeight;
        }
    </script>
</body>
</html>
