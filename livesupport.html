<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wstorepk Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- EmailJS Library Addition -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("OOffYOVaBYznz3QQ5"); // Aapki Public Key
       })();
    </script>

    <style>
        .header-bg { background-color: #2c1a1a; }
        #chat-msgs { height: 70vh; overflow-y: auto; display: flex; flex-direction: column; padding: 10px; }
        .msg-bot { background: #f3f4f6; padding: 10px; border-radius: 15px 15px 15px 0; margin: 5px; align-self: flex-start; max-width: 80%; font-size: 14px; }
        .msg-user { background: #e5e7eb; padding: 10px; border-radius: 15px 15px 0 15px; margin: 5px; align-self: flex-end; max-width: 80%; font-size: 14px; }
        .opt-btn { border: 1px solid #ddd; padding: 6px 15px; border-radius: 20px; background: white; margin: 3px; font-size: 13px; }
    </style>
</head>
<body class="bg-gray-100">
    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <div class="max-w-md mx-auto bg-white h-screen shadow-lg flex flex-col">
        <div class="header-bg p-4 flex items-center text-white min-h-[70px]">
            <div id="agent-info" class="flex items-center hidden">
                <img id="agent-dp" class="w-10 h-10 rounded-full mr-3 border border-white">
                <div>
                    <h3 id="agent-name" class="font-bold text-sm"></h3>
                    <p class="text-[10px] text-green-400">● Online</p>
                </div>
            </div>
            <div id="default-head" class="w-full text-center font-bold">Wstorepk Support</div>
        </div>

        <div id="reg-screen" class="p-10 text-center">
            <h2 class="font-bold mb-4">Please Enter Your Name</h2>
            <input type="text" id="u-name" class="w-full border p-2 rounded mb-4 outline-none" placeholder="Your Name">
            <button onclick="startChat()" class="header-bg text-white w-full py-2 rounded">Start Chat</button>
        </div>

        <div id="chat-screen" class="flex-grow flex flex-col hidden">
            <div id="chat-msgs"></div>
            <div id="options-box" class="p-2 flex flex-wrap justify-center bg-gray-50 border-t"></div>
            <div id="input-box" class="p-3 border-t flex hidden">
                <input type="text" id="msg-input" class="flex-grow outline-none text-sm" placeholder="Type a message...">
                <button onclick="sendMsg()" class="text-blue-600 font-bold px-2">Send</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAZzGQkZGdpOjhMO3kTUgaAbwh-Fd7B1vQ",
            authDomain: "gen-lang-client-0714644264.firebaseapp.com",
            databaseURL: "https://gen-lang-client-0714644264-default-rtdb.firebaseio.com",
            projectId: "gen-lang-client-0714644264",
            storageBucket: "gen-lang-client-0714644264.firebasestorage.app",
            messagingSenderId: "69637950744",
            appId: "1:69637950744:web:7625bda135597bb3ada26d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let sid = "", userName = "";
        let isEmailSent = false; // To prevent multiple emails in one session

        function startChat() {
            userName = document.getElementById('u-name').value;
            if(!userName) return;
            sid = "chat_" + Date.now();
            document.getElementById('reg-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            
            db.ref('sessions/'+sid).set({ userName, status: 'active' });

            // Admin ko email bhejne ka function call
            sendNotificationEmail("A new user named '" + userName + "' has started a live support chat.");

            botReply("Welcome to Wstorepk! Please select your preferred language to continue.");
            showOpts(['English', 'اردو', 'Roman Urdu'], 'lang');

            db.ref('sessions/'+sid).on('value', snap => {
                const data = snap.val();
                if(data.agent) {
                    document.getElementById('default-head').classList.add('hidden');
                    document.getElementById('agent-info').classList.remove('hidden');
                    document.getElementById('agent-name').innerText = data.agent.name;
                    document.getElementById('agent-dp').src = data.agent.dp;
                    document.getElementById('input-box').classList.remove('hidden');
                }
                if(data.status === 'closed') { alert("Chat Ended"); location.reload(); }
            });

            db.ref('messages/'+sid).on('child_added', snap => {
                const m = snap.val();
                if(m.sender !== userName) {
                    botReply(m.text);
                    document.getElementById('msg-sound').play();
                }
            });

            setTimeout(() => {
                db.ref('sessions/'+sid).once('value', s => {
                    if(!s.val().agent) {
                        botReply("Currently all agents are busy please hold or send your issue we will solve it.");
                        document.getElementById('input-box').classList.remove('hidden');
                    }
                });
            }, 240000);
        }

        // --- Naya Email Notification Function ---
        function sendNotificationEmail(messageText) {
            if (isEmailSent) return; // Aik session mein aik hi email jayegi

            const templateParams = {
                message: messageText,
                from_name: userName || "New User"
            };

            emailjs.send('service_s7gw64h', 'template_ni8n90o', templateParams)
                .then(function(response) {
                   console.log('Email Sent to Admin!', response.status, response.text);
                   isEmailSent = true; 
                }, function(error) {
                   console.log('Email failed...', error);
                });
        }

        function botReply(t) {
            const box = document.getElementById('chat-msgs');
            box.innerHTML += `<div class="msg-bot">${t}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function showOpts(opts, type) {
            const box = document.getElementById('options-box');
            box.innerHTML = "";
            opts.forEach(o => {
                const btn = document.createElement('button');
                btn.className = "opt-btn";
                btn.innerText = o;
                btn.onclick = () => {
                    document.getElementById('chat-msgs').innerHTML += `<div class="msg-user">${o}</div>`;
                    box.innerHTML = "";
                    db.ref('sessions/'+sid+'/path').push(o);
                    if(type === 'lang') {
                        botReply("Please select your issue:");
                        showOpts(['Account Issue', 'Order Issue', 'Order Pending', 'Other'], 'issue');
                    } else {
                        botReply("Please hold on we are connecting you to a specialist.");
                    }
                };
                box.appendChild(btn);
            });
        }

        function sendMsg() {
            const t = document.getElementById('msg-input').value;
            if(!t) return;

            // Agar user ne koi text likha hai to email trigger ho (agar pehle nahi hui)
            sendNotificationEmail("User sent a manual message: " + t);

            db.ref('messages/'+sid).push({ sender: userName, text: t });
            document.getElementById('chat-msgs').innerHTML += `<div class="msg-user">${t}</div>`;
            document.getElementById('msg-input').value = "";
            document.getElementById('chat-msgs').scrollTop = document.getElementById('chat-msgs').scrollHeight;
        }
    </script>
</body>
</html>
